<!-- Post Stats Widget -->
<div class="post-stats">
  <span class="post-views">
    <i class="fas fa-eye"></i>
    <span id="post-view-count">--</span> views
  </span>
  <button class="like-btn" id="like-btn" aria-label="Like this post">
    <i class="fas fa-heart"></i>
    <span id="like-count">--</span>
  </button>
</div>
